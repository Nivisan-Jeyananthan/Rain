name: Build Flatpak and Windows EXE

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle'
    
    - name: Compile Java sources
      working-directory: Rain.Network
      run: |
        find src -name '*.java' > /tmp/rain_java_files.txt
        javac @/tmp/rain_java_files.txt -d bin
    
    - name: Create JAR with Manifest
      working-directory: Rain.Network
      run: |
        echo "Main-Class: ch.nivisan.raincloud.network.client.Main" > MANIFEST.MF
        jar cfm Client.jar MANIFEST.MF -C bin .
    
    - name: Install Python PIL
      run: |
        python3 -m pip install --user pillow
      continue-on-error: true
    
    - name: Generate Icon
      run: |
        python3 create-icon.py
      continue-on-error: true
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: Client.jar
        path: Rain.Network/Client.jar
        retention-days: 7
    
    - name: Upload Icon artifact (optional)
      uses: actions/upload-artifact@v4
      with:
        name: icon.ico
        path: Rain.Network/icon.ico
        retention-days: 7
      continue-on-error: true

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: build-jar
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: Client.jar
        path: Rain.Network/
    
    - name: Install Flatpak tools
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder
    
    - name: Add Flathub Repository (with --user flag)
      run: |
        flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo || true
      continue-on-error: true
    
    - name: Install Flatpak Runtime (system-wide)
      run: |
        sudo flatpak install --system -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08 || true
      continue-on-error: true
    
    - name: Build Flatpak
      working-directory: Rain.Network
      run: |
        echo "=== Building Flatpak ==="
        ls -la
        flatpak-builder --force-clean --default-permissions build-dir com.nivisan.raincloud.network.client.json --verbose || echo "Flatpak build failed"
        echo "=== Build directory contents ==="
        ls -la build-dir/ || echo "No build-dir found"
    
    - name: Create Flatpak Bundle
      working-directory: Rain.Network
      run: |
        if [ -d "build-dir" ]; then
          echo "=== Creating bundle ==="
          flatpak build-bundle build-dir rainchat.flatpak com.nivisan.raincloud.network.client || echo "Bundle creation failed"
          echo "=== Checking bundle ==="
          ls -la rainchat.flatpak || echo "Bundle not created"
        else
          echo "Build directory not found, skipping bundle creation"
        fi
      continue-on-error: true
    
    - name: Upload Flatpak artifact (if exists)
      uses: actions/upload-artifact@v4
      with:
        name: rainchat.flatpak
        path: Rain.Network/rainchat.flatpak
        retention-days: 7
      continue-on-error: true

  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: build-jar
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: Client.jar
        path: Rain.Network/
    
    - name: Download Icon artifact (if available)
      uses: actions/download-artifact@v4
      with:
        name: icon.ico
        path: Rain.Network/
      continue-on-error: true
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle'
    
    - name: Install Python PIL
      run: |
        python -m pip install --user pillow
      continue-on-error: true
    
    - name: Generate Icon
      run: python create-icon.py
      continue-on-error: true
    
    - name: Build Windows EXE with jpackage
      working-directory: Rain.Network
      run: |
        if exist icon.ico (
          jpackage --input . --type app-image --app-version 2.0 --name RainChat --main-jar Client.jar --main-class ch.nivisan.raincloud.network.client.Main --icon icon.ico --vendor "Nivisan-Jeyananthan"
        ) else (
          echo Icon not found, building without icon...
          jpackage --input . --type app-image --app-version 2.0 --name RainChat --main-jar Client.jar --main-class ch.nivisan.raincloud.network.client.Main --vendor "Nivisan-Jeyananthan"
        )
      shell: cmd
    
    - name: Create ZIP from app-image
      working-directory: Rain.Network
      run: |
        if exist RainChat (
          powershell Compress-Archive -Path RainChat -DestinationPath RainChat-Windows-Portable.zip
        ) else (
          echo App-image directory not found
          dir
        )
      shell: cmd
    
    - name: Upload Windows Portable ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: RainChat-Windows-Portable
        path: Rain.Network/RainChat-Windows-Portable.zip
        retention-days: 7

  build-macos-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: build-jar
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: Client.jar
        path: Rain.Network/
    
    - name: Download Icon artifact (if available)
      uses: actions/download-artifact@v4
      with:
        name: icon.ico
        path: Rain.Network/
      continue-on-error: true
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle'
    
    - name: Install Python PIL
      run: |
        python3 -m pip install --user pillow
      continue-on-error: true
    
    - name: Generate Icon
      run: python3 create-icon.py
      continue-on-error: true
    
    - name: Convert ICO to ICNS for macOS
      working-directory: Rain.Network
      run: |
        python3 << 'ENDOFPYTHON'
        import os
        if os.path.exists('icon.ico'):
          try:
            from PIL import Image
            img = Image.open('icon.ico')
            img.save('icon.icns')
            print("✓ Icon converted to ICNS")
          except Exception as e:
            print(f"Icon conversion failed: {e}, will build without icon")
        else:
          print("No icon.ico found, will build without icon")
        ENDOFPYTHON
      shell: bash
      continue-on-error: true
    
    - name: Build macOS DMG with jpackage
      working-directory: Rain.Network
      run: |
        if [ -f "icon.icns" ]; then
          jpackage --input . --type dmg --app-version 2.0 --name RainChat --main-jar Client.jar --main-class ch.nivisan.raincloud.network.client.Main --icon icon.icns --vendor "Nivisan-Jeyananthan"
        else
          echo "Icon not found, building without icon..."
          jpackage --input . --type dmg --app-version 2.0 --name RainChat --main-jar Client.jar --main-class ch.nivisan.raincloud.network.client.Main --vendor "Nivisan-Jeyananthan"
        fi
      shell: bash
    
    - name: Upload macOS DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: RainChat-macOS-DMG
        path: Rain.Network/RainChat-*.dmg
        retention-days: 7

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ build-jar, build-flatpak, build-windows-exe, build-macos-dmg ]
    environment: production
    if: always() && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/master')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
    
    - name: Create Release (Tags)
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        files: |
          artifacts/Client.jar/Client.jar
          artifacts/rainchat.flatpak/rainchat.flatpak
          artifacts/RainChat-Windows-Portable/*.zip
          artifacts/RainChat-macOS-DMG/*.dmg
        generate_release_notes: true
    
    - name: Create Draft Release (Master branch)
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/master'
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        draft: true
        prerelease: true
        files: |
          artifacts/Client.jar/Client.jar
          artifacts/rainchat.flatpak/rainchat.flatpak
          artifacts/RainChat-Windows-Portable/*.zip
          artifacts/RainChat-macOS-DMG/*.dmg
        generate_release_notes: true
        tag_name: latest-master
        name: Latest Master Build
