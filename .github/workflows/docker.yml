name: Docker Build and Publish

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-server:
    name: Build and publish Rain.Network server image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: Rain.Network
          file: Rain.Network/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/rain-network-server:${{ github.sha }}
          platforms: linux/amd64

      - name: Build and push latest image on main/master
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v5
        with:
          context: Rain.Network
          file: Rain.Network/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/rain-network-server:latest
          platforms: linux/amd64
